<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Robot head -->
  <rect x="20" y="25" width="60" height="55" rx="8" fill="url(#grad)"/>
  
  <!-- Eyes -->
  <circle cx="35" cy="48" r="6" fill="white"/>
  <circle cx="65" cy="48" r="6" fill="white"/>
  <circle cx="35" cy="48" r="3" fill="#1e293b"/>
  <circle cx="65" cy="48" r="3" fill="#1e293b"/>
  
  <!-- Mouth -->
  <path d="M 35 65 Q 50 70 65 65" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>
